<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رعاية كبار السن في المنزل — الحلقة الرابعة: الإمساك</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Cairo:wght@400;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary:#92400E;--primary-light:#B45309;--primary-dark:#451A03;
    --accent:#F59E0B;--accent-light:#FEF3C7;--accent-mid:#FCD34D;
    --danger:#DC2626;--danger-light:#FEE2E2;
    --warning:#D97706;--warning-light:#FEF3C7;
    --success:#059669;--success-light:#D1FAE5;
    --text-dark:#111827;--text-mid:#374151;--text-light:#6B7280;
    --bg:#FFFBF5;--white:#FFFFFF;--border:#E5E7EB;
    --card-shadow:0 2px 12px rgba(146,64,14,0.10);
    --font-ar:'Tajawal','Cairo',sans-serif;
    --font-en:'Lato',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font-ar);background:var(--bg);color:var(--text-dark);min-height:100vh;}

  /* ── LTR overrides when English is active ── */
  html[dir=ltr] body{font-family:var(--font-en);}
  html[dir=ltr] .intro-banner{border-inline-start:4px solid var(--accent);text-align:left;}
  html[dir=ltr] .alert-box{text-align:left;}
  html[dir=ltr] .step-body h3,html[dir=ltr] .step-body p{text-align:left;}
  html[dir=ltr] .note-box{text-align:left;}
  html[dir=ltr] .section-title{text-align:left;}
  html[dir=ltr] .prep-step{text-align:left;}
  html[dir=ltr] .food-card-label,html[dir=ltr] .food-card-sub,
  html[dir=ltr] .fluid-card-label,html[dir=ltr] .fluid-card-sub{text-align:center;}
  html[dir=ltr] .caution-item{text-align:left;}
  html[dir=ltr] .info-box{text-align:left;}
  html[dir=ltr] .collapsible-header{text-align:left;}
  html[dir=ltr] .collapsible-body{text-align:left;}
  html[dir=ltr] .collapsible-body ul{padding-inline-start:18px;}
  html[dir=ltr] .warning-item{text-align:left;}
  html[dir=ltr] .improvement-item{text-align:left;}
  html[dir=ltr] .dehydration-box{text-align:left;}
  html[dir=ltr] .quiz-question{text-align:left;}
  html[dir=ltr] .quiz-opt{text-align:left;}
  html[dir=ltr] .quiz-feedback{text-align:left;}
  html[dir=ltr] .nav-link{font-family:var(--font-en);}
  html[dir=ltr] .tab-btn{font-family:var(--font-en);font-size:11px;}

  /* HEADER */
  .header{background:linear-gradient(135deg,var(--primary-dark) 0%,var(--primary) 60%,var(--primary-light) 100%);color:var(--white);padding:36px 20px 26px;text-align:center;position:relative;}
  .episode-badge{display:inline-block;background:rgba(255,255,255,0.18);border-radius:20px;font-size:12px;padding:3px 14px;margin-bottom:10px;}
  .header h1{font-size:clamp(21px,5vw,32px);font-weight:800;line-height:1.25;margin-bottom:8px;}
  .header-sub{font-size:14px;opacity:.85;max-width:500px;margin:0 auto;}
  .header-authors{display:flex;justify-content:center;gap:24px;flex-wrap:wrap;direction:ltr;margin-top:10px;font-size:13px;font-weight:700;opacity:.9;}

  /* LANG TOGGLE */
  .lang-toggle{position:absolute;top:16px;left:16px;display:flex;background:rgba(255,255,255,0.14);border-radius:30px;overflow:hidden;border:1.5px solid rgba(255,255,255,0.3);}
  .lang-btn{padding:6px 14px;font-size:13px;font-weight:700;border:none;background:transparent;color:rgba(255,255,255,0.7);cursor:pointer;transition:all .2s;font-family:var(--font-en);}
  .lang-btn.active{background:var(--white);color:var(--primary);border-radius:28px;}

  /* TABS */
  .tabs-wrapper{background:var(--white);border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.06);}
  .tabs{display:flex;overflow-x:auto;scrollbar-width:none;max-width:700px;margin:0 auto;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab-btn{flex:1;min-width:88px;padding:13px 6px 11px;border:none;background:transparent;font-size:12px;font-weight:700;color:var(--text-light);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;text-align:center;}
  .tab-btn.active{color:var(--primary);border-bottom-color:var(--accent);}
  .tab-btn:hover{color:var(--primary);background:var(--accent-light);}

  /* CONTENT */
  .content{max-width:700px;margin:0 auto;padding:24px 16px 120px;}
  .tab-panel{display:none;}
  .tab-panel.active{display:block;animation:fadeIn .28s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}

  /* INTRO BANNER */
  .intro-banner{background:linear-gradient(135deg,var(--accent-light),#fffbeb);border-inline-start:4px solid var(--accent);border-radius:12px;padding:16px 18px;margin-bottom:22px;font-size:15px;line-height:1.75;color:var(--primary-dark);}
  .intro-banner strong{color:var(--primary);font-weight:800;}

  /* ALERT BOX */
  .alert-box{display:flex;align-items:flex-start;gap:10px;background:var(--warning-light);border:1.5px solid #FDE68A;border-radius:10px;padding:13px 16px;margin-bottom:20px;font-size:14px;color:#78350F;font-weight:600;line-height:1.65;}
  .alert-icon{font-size:20px;flex-shrink:0;margin-top:1px;}

  /* STEPS */
  .steps{display:flex;flex-direction:column;gap:14px;margin-bottom:24px;}
  .step{background:var(--white);border-radius:14px;box-shadow:var(--card-shadow);padding:17px 18px 15px;display:flex;gap:14px;align-items:flex-start;border:1.5px solid var(--border);transition:box-shadow .2s,border-color .2s;}
  .step:hover{box-shadow:0 4px 20px rgba(146,64,14,.13);border-color:var(--accent-mid);}
  .step-num{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:var(--white);font-weight:800;font-size:15px;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .step-body h3{font-size:15px;font-weight:800;color:var(--primary-dark);margin-bottom:5px;}
  .step-body p{font-size:14px;color:var(--text-mid);line-height:1.7;}

  /* NOTE BOX */
  .note-box{background:var(--accent-light);border-radius:10px;padding:12px 16px;font-size:13px;color:var(--primary-dark);font-weight:600;margin-top:20px;border:1.5px solid var(--accent-mid);line-height:1.75;white-space:pre-line;}

  /* SECTION TITLE */
  .section-title{font-size:17px;font-weight:800;color:var(--primary-dark);margin-bottom:14px;display:flex;align-items:center;gap:8px;}

  /* PREP STEPS (fibre/fluids recipe style) */
  .prep-steps{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
  .prep-step{display:flex;align-items:center;gap:12px;background:var(--white);border-radius:10px;padding:12px 14px;border:1.5px solid var(--border);font-size:14px;color:var(--primary-dark);font-weight:600;}
  .prep-num{background:var(--primary);color:white;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;}

  /* FOOD GRID */
  .food-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:22px;}
  .food-card{background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .2s;box-shadow:var(--card-shadow);}
  .food-card:hover,.food-card.open{border-color:var(--accent);background:var(--accent-light);transform:translateY(-2px);}
  .food-card-emoji{font-size:28px;margin-bottom:4px;}
  .food-card-label{font-size:12px;font-weight:700;color:var(--primary-dark);margin-bottom:2px;}
  .food-card-sub{font-size:11px;color:var(--text-light);}
  .food-detail{display:none;margin-top:7px;font-size:11.5px;color:var(--primary-dark);line-height:1.6;background:var(--white);border-radius:7px;padding:7px;text-align:start;}
  .food-card.open .food-detail{display:block;}

  /* FLUIDS GRID */
  .fluids-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:22px;}
  .fluid-card{background:var(--white);border:1.5px solid #BAE6FD;border-radius:12px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(14,116,144,.08);}
  .fluid-card:hover,.fluid-card.open{border-color:#0EA5E9;background:#EFF6FF;transform:translateY(-2px);}
  .fluid-card-emoji{font-size:28px;margin-bottom:5px;}
  .fluid-card-label{font-size:12px;font-weight:700;color:#0C4A6E;margin-bottom:2px;}
  .fluid-card-sub{font-size:11px;color:#0369A1;}
  .fluid-detail{display:none;margin-top:7px;font-size:11.5px;color:#0C4A6E;line-height:1.65;background:var(--white);border-radius:7px;padding:7px;text-align:start;}
  .fluid-card.open .fluid-detail{display:block;}

  /* CAUTION GRID */
  .caution-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px;}
  .caution-item{background:#FFF7ED;border:1.5px solid #FED7AA;border-radius:12px;padding:12px;font-size:13px;font-weight:700;color:#7C2D12;display:flex;align-items:flex-start;gap:7px;line-height:1.5;}
  .caution-emoji{font-size:16px;flex-shrink:0;}
  .caution-detail{font-size:11px;font-weight:400;color:#9F1239;margin-top:3px;}

  /* INFO BOX */
  .info-box{background:linear-gradient(135deg,#FEF3C7,#FDE68A22);border:1.5px solid var(--accent-mid);border-radius:12px;padding:16px;margin-bottom:20px;font-size:14px;color:var(--primary-dark);line-height:1.8;}
  .info-box h4{font-size:15px;font-weight:800;color:var(--primary);margin-bottom:8px;}
  .info-box ul{padding-inline-start:16px;}

  /* COLLAPSIBLE */
  .collapsible{background:var(--white);border:1.5px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;box-shadow:var(--card-shadow);}
  .collapsible-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;font-weight:700;font-size:14px;color:var(--primary-dark);transition:background .18s;gap:8px;}
  .collapsible-header:hover{background:var(--accent-light);}
  .c-icon{font-size:18px;flex-shrink:0;}
  .c-arrow{font-size:12px;color:var(--text-light);transition:transform .2s;flex-shrink:0;}
  .collapsible.open .c-arrow{transform:rotate(90deg);}
  .collapsible-body{display:none;padding:4px 16px 14px;font-size:13.5px;color:var(--text-mid);line-height:1.75;border-top:1px solid var(--border);}
  .collapsible.open .collapsible-body{display:block;}
  .collapsible-body ul{padding-inline-start:18px;}
  .collapsible-body li{margin-bottom:5px;}

  /* WARNING / IMPROVEMENT */
  .warning-section{background:var(--danger-light);border:2px solid #FCA5A5;border-radius:14px;padding:18px;margin-bottom:18px;}
  .warning-section h3{color:var(--danger);font-size:16px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
  .warning-list{list-style:none;display:flex;flex-direction:column;gap:8px;}
  .warning-item{display:flex;align-items:flex-start;gap:10px;background:var(--white);border-radius:10px;padding:10px 14px;font-size:14px;font-weight:600;color:#7F1D1D;line-height:1.5;border:1px solid #FCA5A5;}
  .warning-dot{width:10px;height:10px;border-radius:50%;background:var(--danger);flex-shrink:0;margin-top:5px;}
  .improvement-section{background:var(--success-light);border:2px solid #6EE7B7;border-radius:14px;padding:18px;margin-bottom:18px;}
  .improvement-section h3{color:var(--success);font-size:16px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
  .improvement-list{list-style:none;display:flex;flex-direction:column;gap:8px;}
  .improvement-item{display:flex;align-items:flex-start;gap:10px;background:var(--white);border-radius:10px;padding:10px 14px;font-size:14px;font-weight:600;color:#064E3B;line-height:1.5;border:1px solid #6EE7B7;}
  .improvement-dot{width:10px;height:10px;border-radius:50%;background:var(--success);flex-shrink:0;margin-top:5px;}
  .dehydration-box{background:#FFF7ED;border:1.5px solid #FED7AA;border-radius:12px;padding:14px 16px;margin-bottom:18px;font-size:13.5px;color:#7C2D12;line-height:1.75;}
  .dehydration-box strong{color:#C2410C;font-weight:800;}

  /* QUIZ */
  .quiz-q{background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:18px;margin-bottom:16px;box-shadow:var(--card-shadow);}
  .quiz-question{font-size:15px;font-weight:800;color:var(--primary-dark);margin-bottom:14px;line-height:1.5;}
  .quiz-options{display:flex;flex-direction:column;gap:8px;}
  .quiz-opt{background:var(--bg);border:2px solid var(--border);border-radius:10px;padding:11px 14px;font-size:14px;font-weight:600;color:var(--text-mid);cursor:pointer;transition:all .18s;text-align:start;}
  .quiz-opt:hover{border-color:var(--accent);background:var(--accent-light);color:var(--primary);}
  .quiz-opt.correct{background:var(--success-light);border-color:var(--success);color:var(--success);}
  .quiz-opt.wrong{background:var(--danger-light);border-color:var(--danger);color:var(--danger);}
  .quiz-opt:disabled{cursor:default;pointer-events:none;}
  .quiz-feedback{margin-top:10px;font-size:13px;font-weight:700;padding:8px 12px;border-radius:8px;display:none;line-height:1.6;}
  .quiz-feedback.show{display:block;}
  .quiz-feedback.correct{background:var(--success-light);color:var(--success);}
  .quiz-feedback.wrong{background:var(--danger-light);color:var(--danger);}
  .quiz-score{text-align:center;font-size:15px;font-weight:700;color:var(--primary);margin-top:10px;display:none;}
  .quiz-score.show{display:block;}

  /* SHARE */
  .share-section{background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:20px;margin-top:24px;text-align:center;box-shadow:var(--card-shadow);}
  .share-title{font-size:16px;font-weight:800;color:var(--primary-dark);margin-bottom:5px;}
  .share-sub{font-size:13px;color:var(--text-light);margin-bottom:14px;}
  .share-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  .share-btn{padding:9px 18px;border-radius:30px;font-size:13px;font-weight:700;border:none;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:6px;}
  .share-btn:hover{transform:translateY(-1px);box-shadow:0 3px 12px rgba(0,0,0,.14);}
  .share-btn.wa{background:#25D366;color:white;}
  .share-btn.li{background:#0A66C2;color:white;}
  .share-btn.fb{background:#1877F2;color:white;}
  .share-btn.copy{background:var(--bg);color:var(--primary);border:1.5px solid var(--border);}

  /* DISCLAIMER */
  .disclaimer{font-size:12px;color:var(--text-light);text-align:center;margin-top:14px;padding:0 10px;line-height:1.6;}

  /* NAV BAR */
  .nav-bar{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:2px solid var(--border);z-index:200;box-shadow:0 -4px 16px rgba(0,0,0,.07);}
  .nav-bar-inner{max-width:700px;width:100%;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:12px 18px;}
  .nav-link{display:flex;align-items:center;gap:6px;padding:9px 14px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;transition:all .18s;}
  .nav-link.prev{background:var(--bg);color:var(--primary);border:1.5px solid var(--border);}
  .nav-link.prev:hover{background:var(--accent-light);border-color:var(--accent);}
  .nav-link.next{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:var(--white);box-shadow:0 3px 12px rgba(146,64,14,.28);}
  .nav-link.next:hover{transform:translateY(-1px);box-shadow:0 5px 18px rgba(146,64,14,.38);}
  .nav-episode{font-size:11px;color:var(--text-light);text-align:center;font-weight:600;}

  @media(max-width:480px){
    .caution-grid{grid-template-columns:1fr;}
    .food-grid{grid-template-columns:repeat(2,1fr);}
    .fluids-grid{grid-template-columns:repeat(2,1fr);}
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="lang-toggle">
    <button class="lang-btn active" id="btnAr" onclick="setLang('ar')">العربية</button>
    <button class="lang-btn"        id="btnEn" onclick="setLang('en')">English</button>
  </div>
  <div class="episode-badge"  id="hBadge"></div>
  <h1                          id="hTitle"></h1>
  <p class="header-sub"        id="hSub"></p>
  <div class="header-authors">
    <span>Prof. Randa Reda</span>
    <span>Prof. Sarah Hamza</span>
  </div>
</div>

<!-- TABS -->
<div class="tabs-wrapper">
  <div class="tabs">
    <button class="tab-btn active" onclick="openTab(0)" id="tab-btn-0"></button>
    <button class="tab-btn"        onclick="openTab(1)" id="tab-btn-1"></button>
    <button class="tab-btn"        onclick="openTab(2)" id="tab-btn-2"></button>
    <button class="tab-btn"        onclick="openTab(3)" id="tab-btn-3"></button>
  </div>
</div>

<!-- CONTENT -->
<div class="content">

  <!-- TAB 1: WHAT TO DO FIRST -->
  <div class="tab-panel active" id="tab0">
    <div class="intro-banner" id="t0Banner"></div>
    <div class="alert-box"><span class="alert-icon">⚠️</span><span id="t0Alert"></span></div>
    <div class="steps" id="t0Steps"></div>
    <div class="note-box" id="t0Note"></div>
  </div>

  <!-- TAB 2: NUTRITION & HYDRATION -->
  <div class="tab-panel" id="tab1">
    <div class="section-title"><span>🌾</span><span id="t1FibreTitle"></span></div>
    <p id="t1FibreHint" style="font-size:13px;color:var(--text-light);margin-bottom:12px;"></p>
    <div class="food-grid" id="t1FoodGrid"></div>

    <div class="section-title"><span>💧</span><span id="t1FluidTitle"></span></div>
    <p id="t1FluidHint" style="font-size:13px;color:var(--text-light);margin-bottom:12px;"></p>
    <div class="fluids-grid" id="t1FluidGrid"></div>

    <div class="section-title"><span>⚠️</span><span id="t1CautionTitle"></span></div>
    <div class="caution-grid" id="t1CautionGrid"></div>

    <div class="info-box">
      <h4 id="t1TipsTitle"></h4>
      <ul id="t1TipsList"></ul>
    </div>

    <div class="section-title"><span>🔍</span><span id="t1ExtraTitle"></span></div>
    <div id="t1Collapsibles"></div>

    <div class="share-section">
      <div class="share-title" id="shareTitle"></div>
      <div class="share-sub"   id="shareSub"></div>
      <div class="share-btns">
        <button class="share-btn wa" onclick="shareWA()">📱 WhatsApp</button>
        <button class="share-btn li" onclick="shareLI()">LinkedIn</button>
        <button class="share-btn fb" onclick="shareFB()">Facebook</button>
        <button class="share-btn copy" id="shareCopyBtn" onclick="copyLink()"></button>
      </div>
    </div>
    <p class="disclaimer" id="disclaimer"></p>
  </div>

  <!-- TAB 3: WARNING SIGNS -->
  <div class="tab-panel" id="tab2">
    <div class="warning-section">
      <h3><span>🔴</span><span id="t2WarnTitle"></span></h3>
      <ul class="warning-list" id="t2WarnList"></ul>
    </div>
    <div class="dehydration-box"><strong id="t2NoteLabel"></strong><span id="t2NoteText"></span></div>
    <div class="improvement-section">
      <h3><span>📈</span><span id="t2ImpTitle"></span></h3>
      <ul class="improvement-list" id="t2ImpList"></ul>
    </div>
    <div id="t2Collapsible"></div>
    <div class="note-box" style="margin-top:16px;" id="t2Note"></div>
  </div>

  <!-- TAB 4: QUIZ -->
  <div class="tab-panel" id="tab3">
    <div class="intro-banner" id="quizBanner"></div>
    <div id="quizContainer"></div>
    <div class="quiz-score" id="quiz-score"></div>
  </div>

</div>

<!-- NAV BAR -->
<div class="nav-bar">
  <div class="nav-bar-inner">
    <a href="https://randareda-droid.github.io/Patient-Guide-/week3.html" class="nav-link prev" id="navPrev"></a>
    <div class="nav-episode" id="navEpisode"></div>
    <a href="https://randareda-droid.github.io/Patient-Guide-/week5.html" class="nav-link next" id="navNext"></a>
  </div>
</div>

<script>
const CONTENT = {
  ar: {
    pageTitle:   'رعاية كبار السن في المنزل — الحلقة الرابعة: الإمساك',
    badge:       'الحلقة الرابعة',
    h1:          'الإمساك — ماذا نفعل في المنزل؟',

/* ═══════════════ RENDER ENGINE ═══════════════ */
let lang = 'ar';
const scores = {q1:null,q2:null,q3:null};
const $ = id => document.getElementById(id);

function render(l) {
  lang = l;
  const d = CONTENT[l];
  const isEn = l === 'en';

  document.documentElement.lang = l;
  document.documentElement.dir  = isEn ? 'ltr' : 'rtl';
  document.body.style.fontFamily = isEn ? "'Lato',sans-serif" : "'Tajawal','Cairo',sans-serif";
  document.title = d.pageTitle;

  $('btnAr').classList.toggle('active', !isEn);
  $('btnEn').classList.toggle('active',  isEn);
  $('hBadge').textContent = d.badge;
  $('hTitle').textContent = d.h1;
  $('hSub').textContent   = d.hSub;
  d.tabs.forEach((t,i) => $('tab-btn-'+i).textContent = t);

  // TAB 0
  $('t0Banner').innerHTML  = d.t0Banner;
  $('t0Alert').textContent = d.t0Alert;
  $('t0Steps').innerHTML   = d.t0Steps.map((s,i) => `
    <div class="step">
      <div class="step-num">${i+1}</div>
      <div class="step-body"><h3>${s[0]}</h3><p>${s[1]}</p></div>
    </div>`).join('');
  $('t0Note').textContent = d.t0Note;

  // TAB 1
  $('t1FibreTitle').textContent = d.t1FibreTitle;
  $('t1FibreHint').textContent  = d.t1FibreHint;
  $('t1FoodGrid').innerHTML = d.foods.map(f => `
    <div class="food-card" onclick="toggleFood(this)">
      <div class="food-card-emoji">${f[0]}</div>
      <div class="food-card-label">${f[1]}</div>
      <div class="food-card-sub">${f[2]}</div>
      <div class="food-detail">${f[3]}</div>
    </div>`).join('');

  $('t1FluidTitle').textContent = d.t1FluidTitle;
  $('t1FluidHint').textContent  = d.t1FluidHint;
  $('t1FluidGrid').innerHTML = d.fluids.map(f => `
    <div class="fluid-card" onclick="toggleFluid(this)">
      <div class="fluid-card-emoji">${f[0]}</div>
      <div class="fluid-card-label">${f[1]}</div>
      <div class="fluid-card-sub">${f[2]}</div>
      <div class="fluid-detail">${f[3]}</div>
    </div>`).join('');

  $('t1CautionTitle').textContent = d.t1CautionTitle;
  $('t1CautionGrid').innerHTML = d.cautions.map(c => `
    <div class="caution-item">
      <span class="caution-emoji">${c[0]}</span>
      <div><div>${c[1]}</div><div class="caution-detail">${c[2]}</div></div>
    </div>`).join('');

  $('t1TipsTitle').textContent = d.t1TipsTitle;
  $('t1TipsList').innerHTML = d.tipsList.map(t => `<li>${t}</li>`).join('');

  $('t1ExtraTitle').textContent = d.t1ExtraTitle;
  $('t1Collapsibles').innerHTML = d.collapsibles1.map(c => makeCollapsible(c)).join('');

  $('shareTitle').textContent   = d.shareTitle;
  $('shareSub').textContent     = d.shareSub;
  $('shareCopyBtn').textContent = d.shareCopy;
  $('disclaimer').textContent   = d.disclaimer;

  // TAB 2
  $('t2WarnTitle').textContent = d.t2WarnTitle;
  $('t2WarnList').innerHTML = d.warnings.map(w => `
    <li class="warning-item"><span class="warning-dot"></span><span>${w}</span></li>`).join('');
  $('t2NoteLabel').textContent = d.t2NoteLabel;
  $('t2NoteText').textContent  = d.t2NoteText;
  $('t2ImpTitle').textContent  = d.t2ImpTitle;
  $('t2ImpList').innerHTML = d.improvements.map(w => `
    <li class="improvement-item"><span class="improvement-dot"></span><span>${w}</span></li>`).join('');
  $('t2Collapsible').innerHTML = d.collapsibles2.map(c => makeCollapsible(c)).join('');
  $('t2Note').textContent = d.t2Note;

  // TAB 3
  $('quizBanner').textContent = d.quizBanner;
  renderQuiz(d);

  // NAV
  $('navPrev').textContent    = d.navPrev;
  $('navEpisode').textContent = d.navEpisode;
  $('navNext').textContent    = d.navNext;

  const scoreEl = $('quiz-score');
  if (scoreEl.dataset.total !== undefined && scoreEl.dataset.total !== '') {
    scoreEl.textContent = d.quizScore(parseInt(scoreEl.dataset.total));
  }
}

function makeCollapsible([icon, title, items]) {
  return `<div class="collapsible" onclick="toggleCollapsible(this)">
    <div class="collapsible-header">
      <span class="c-icon">${icon}</span>
      <span style="flex:1">${title}</span>
      <span class="c-arrow">▶</span>
    </div>
    <div class="collapsible-body"><ul>${items.map(i=>`<li>${i}</li>`).join('')}</ul></div>
  </div>`;
}

function renderQuiz(d) {
  $('quizContainer').innerHTML = d.questions.map((qd,qi) => `
    <div class="quiz-q" id="q${qi+1}">
      <div class="quiz-question">${qd.q}</div>
      <div class="quiz-options">
        ${qd.opts.map((o,oi) => `
          <button class="quiz-opt" onclick="answer(this,'q${qi+1}',${oi===qd.correct},${qi})">${o}</button>
        `).join('')}
      </div>
      <div class="quiz-feedback" id="q${qi+1}-feedback"></div>
    </div>`).join('');

  ['q1','q2','q3'].forEach((qId,qi) => {
    const q = $(qId);
    if (!q || scores[qId] === null) return;
    q.dataset.answered = 'true';
    const opts = q.querySelectorAll('.quiz-opt');
    opts.forEach(o => { o.disabled = true; o.style.opacity = '0.6'; });
    const ci = CONTENT[lang].questions[qi].correct;
    opts[ci].classList.add('correct'); opts[ci].style.opacity = '1';
    const fb = $(qId+'-feedback');
    const wasCorrect = scores[qId] === 1;
    fb.textContent = (wasCorrect ? '✅ ' : '❌ ') + CONTENT[lang].questions[qi].feedbacks[ci];
    fb.className = 'quiz-feedback show ' + (wasCorrect ? 'correct' : 'wrong');
  });
}

/* ═══════════════ INTERACTIONS ═══════════════ */
function setLang(l) { render(l); }

function openTab(i) {
  document.querySelectorAll('.tab-panel').forEach((p,j) => p.classList.toggle('active', j===i));
  document.querySelectorAll('.tab-btn').forEach((b,j) => b.classList.toggle('active', j===i));
}

function toggleCollapsible(el) { el.classList.toggle('open'); }

function toggleFood(el) {
  const was = el.classList.contains('open');
  document.querySelectorAll('.food-card').forEach(c => c.classList.remove('open'));
  if (!was) el.classList.add('open');
}

function toggleFluid(el) {
  const was = el.classList.contains('open');
  document.querySelectorAll('.fluid-card').forEach(c => c.classList.remove('open'));
  if (!was) el.classList.add('open');
}

function answer(btn, qId, isCorrect, qIndex) {
  const q = $(qId);
  if (q.dataset.answered) return;
  q.dataset.answered = 'true';

  const opts = q.querySelectorAll('.quiz-opt');
  opts.forEach(o => { o.disabled = true; o.style.opacity = '0.6'; });
  btn.style.opacity = '1';
  btn.classList.add(isCorrect ? 'correct' : 'wrong');

  const ci = CONTENT[lang].questions[qIndex].correct;
  opts[ci].classList.add('correct'); opts[ci].style.opacity = '1';

  const chosenIdx = Array.from(opts).indexOf(btn);
  const fb = $(qId+'-feedback');
  fb.textContent = (isCorrect ? '✅ ' : '❌ ') + CONTENT[lang].questions[qIndex].feedbacks[chosenIdx];
  fb.className = 'quiz-feedback show ' + (isCorrect ? 'correct' : 'wrong');

  scores[qId] = isCorrect ? 1 : 0;
  const done = Object.values(scores).filter(v => v !== null).length;
  if (done === 3) {
    const total = scores.q1 + scores.q2 + scores.q3;
    const scoreEl = $('quiz-score');
    scoreEl.dataset.total = total;
    scoreEl.textContent = CONTENT[lang].quizScore(total);
    scoreEl.classList.add('show');
  }
}

function shareWA()  { window.open('https://wa.me/?text=' + encodeURIComponent(CONTENT[lang].h1 + '\n' + PAGE_URL), '_blank'); }
function shareLI()  { window.open('https://www.linkedin.com/sharing/share-offsite/?url=' + encodeURIComponent(PAGE_URL), '_blank'); }
function shareFB()  { window.open('https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(PAGE_URL), '_blank'); }
function copyLink() { navigator.clipboard.writeText(PAGE_URL).then(() => alert(lang==='en' ? 'Link copied!' : 'تم نسخ الرابط!')); }

/* ═══════════════ INIT ═══════════════ */
render('ar');
</script>
